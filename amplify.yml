version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Content-Security-Policy'
        value: "connect-src 'self' http://44.203.20.211:8000; img-src 'self' data: http://44.203.20.211:8000;"
redirects:
  - source: /<*> 
    destination: /index.html
    status: 200
    condition: null
